{% extends 'base.html' %}

{% block title %}Delete Product{% endblock %}

{% block content %}
<div class="container mt-5 mb-5" style="min-height: 50vh;">
    <h2>Delete Product</h2>
    <p>Are you sure you want to delete the product "<strong>{{ product.product_name }}</strong>"?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'product_list' %}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
