{% extends 'base.html' %}

{% block content %}
<h2>Confirm Deletion</h2>
<p>Are you sure you want to delete the product "<strong>{{ product.product_name }}</strong>"?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn" style="background: #dc3545;">Yes, Delete</button>
    <a href="{% url 'product_list' %}" class="btn" style="background: #6c757d; margin-left: 10px;">Cancel</a>
</form>
{% endblock %}
