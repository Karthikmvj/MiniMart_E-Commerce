{% extends 'base.html' %}

{% block title %}Edit Profile - MiniMart{% endblock %}

{% block content %}
<div class="mt-0">
    <div class="row g-0 justify-content-center">
        <div class="col-lg-8">
            <div class="soft-card shadow-sm p-4">
                <div class="d-flex align-items-center justify-content-between mb-4">
                    <div>
                        <h2 class="fw-bold mb-1">Edit Profile</h2>
                        <p class="text-muted mb-0">Update your account information and profile photo.</p>
                    </div>
                    {% if user_profile.profile_picture %}
                        <img src="{{ user_profile.profile_picture.url }}" alt="Profile Picture" class="rounded-circle shadow-sm" width="80" height="80" style="object-fit: cover;">
                    {% else %}
                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center shadow-sm" style="width:80px; height:80px;">
                            <i class="bi bi-person fs-3"></i>
                        </div>
                    {% endif %}
                </div>

                <form method="post" enctype="multipart/form-data" class="row g-3">
                    {% csrf_token %}
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" value="{{ request.user.first_name }}" class="form-control" placeholder="First name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" value="{{ request.user.last_name }}" class="form-control" placeholder="Last name">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" value="{{ request.user.email }}" class="form-control" placeholder="Email address">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mobile Number</label>
                        <input type="text" name="mobile_number" value="{{ user_profile.mobile_number }}" class="form-control" placeholder="Mobile number">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Profile Picture</label>
                        <input type="file" name="profile_picture" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="3" placeholder="Enter your address">{{ user_profile.address }}</textarea>
                    </div>
                    <div class="col-12 d-flex flex-column flex-sm-row gap-2 justify-content-end mt-3">
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
