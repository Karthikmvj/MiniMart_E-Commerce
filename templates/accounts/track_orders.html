{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<div class="mt-0">
    <div class="row mb-4 g-0">
        <div class="col-12 px-0">
            <h2 class="fw-bold">My Account</h2>
        </div>
    </div>
    
    <div class="row g-0">
        <!-- Navigation Sidebar -->
        <div class="col-md-4 col-lg-3 px-0 mb-4">
            <div class="list-group shadow-sm border-0">
                <a href="{% url 'profile' %}" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-person-vcard me-2"></i> Account Details
                </a>
                <a href="{% url 'my_orders' %}" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-box-seam me-2"></i> My Orders
                </a>
                <a href="{% url 'track_orders' %}" class="list-group-item list-group-item-action active py-3">
                    <i class="bi bi-truck me-2"></i> Track Orders
                </a>
                <a href="{% url 'wishlist' %}" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-heart me-2"></i> Wishlist
                </a>
                <a href="{% url 'change_password' %}" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-shield-lock me-2"></i> Change Password
                </a>
                <a href="{% url 'logout' %}" class="list-group-item list-group-item-action text-danger py-3">
                    <i class="bi bi-box-arrow-right me-2"></i> Logout
                </a>
            </div>
        </div>

        <!-- Main Card -->
        <div class="col-md-8 col-lg-9 px-0">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0">Track Orders</h5>
                </div>
                <div class="card-body p-4">
                    <form action="#" method="get" class="mb-4">
                        <div class="input-group">
                            <input type="text" name="order_id" class="form-control" placeholder="Enter Order Tracking ID" required>
                            <button class="btn btn-primary" type="submit">Track Order</button>
                        </div>
                    </form>
                    <div class="text-center mt-5 mb-3">
                        <i class="bi bi-truck display-1 text-muted mb-3"></i>
                        <p class="text-muted lead">Enter your tracking ID above to see the status of your shipment.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
