{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="mt-0">
    <div class="row g-0 justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">{% trans "Forgot Password" %}</h3>
                    
                    {% if messages %} 
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                    
                    <form method="POST" action="{% url 'forgot_password' %}">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">{% trans "Registered Email Address" %}</label>
                            <input type="email" name="email" class="form-control" id="email" required placeholder="name@example.com">
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">{% trans "Verify Email" %}</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-3">
                        <p><a href="{% url 'login' %}" class="text-decoration-none">{% trans "Back to Login" %}</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
