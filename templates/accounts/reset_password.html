{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="mt-0">
    <div class="row g-0 justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">{% trans "Reset Password" %}</h3>
                    
                    {% if messages %} 
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                    
                    <form method="POST" action="{% url 'reset_password' %}">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">{% trans "New Password" %}</label>
                            <input type="password" name="password" class="form-control" id="password" required placeholder="{% trans 'Enter New Password' %}">
                        </div>
                        
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">{% trans "Confirm New Password" %}</label>
                            <input type="password" name="confirm_password" class="form-control" id="confirm_password" required placeholder="{% trans 'Confirm New Password' %}">
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">{% trans "Reset Password" %}</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
