<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MiniMart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --mini-navy: #172337;
            --mini-blue: #2874f0;
            --mini-orange: #ff9f00;
            --mini-bg: #f3f6fb;
            --mini-border: #dbe3ef;
        }
        body {
            background: var(--mini-navy);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            max-width: 400px;
            width: 100%;
            padding: 28px;
        }
        .minimart-logo {
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            text-decoration: none;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .minimart-logo:hover {
            transform: scale(1.1) rotate(-3deg);
        }
        .btn-primary {
            background: var(--mini-blue);
            border-color: var(--mini-blue);
            font-size: 14px;
            font-weight: 700;
            padding: 10px;
        }
        .btn-primary:hover {
            background: #1b62db;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="minimart-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" style="vertical-align: middle;">
                <defs>
                    <linearGradient id="miniMartGradAdminLogin" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#FF5E3A" />
                        <stop offset="100%" stop-color="#FFB800" />
                    </linearGradient>
                </defs>
                <rect x="8" y="8" width="84" height="84" rx="22" fill="url(#miniMartGradAdminLogin)" />
                <path d="M 26 70 L 26 30 L 50 54 L 74 30 L 74 70" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
        <h3 class="fw-bold mb-1" style="font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.5px;">Mini<span style="background: linear-gradient(135deg, #FF5E3A, #FBBF24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">Mart</span></h3>
        <p class="text-muted text-uppercase fw-semibold small mb-4">Control Panel Sign In</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if 'error' in message.tags %}danger{% else %}success{% endif %} alert-dismissible fade show text-start" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="text-start">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">
            <div class="mb-3">
                <label for="id_username" class="form-label fw-bold small text-muted">USERNAME</label>
                <input type="text" name="username" class="form-control" id="id_username" placeholder="Enter admin username" required>
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label fw-bold small text-muted">PASSWORD</label>
                <input type="password" name="password" class="form-control" id="id_password" placeholder="Enter password" required>
            </div>
            <div class="mb-3 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input type="checkbox" name="remember_me" class="form-check-input" id="remember_me">
                    <label class="form-check-label text-muted small fw-bold" for="remember_me">REMEMBER ME</label>
                </div>
                <a href="{% url 'adminpanel:forgot_password' %}" class="fw-bold text-decoration-none small">Forgot Password?</a>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Sign In</button>
            </div>
        </form>

        <div class="d-flex align-items-center gap-2 my-3">
            <div style="flex:1; height:1px; background:#e2e8f0;"></div>
            <span class="text-muted fw-semibold" style="font-size:11px; text-transform:uppercase; letter-spacing:.05em;">or</span>
            <div style="flex:1; height:1px; background:#e2e8f0;"></div>
        </div>

        <a href="{% url 'adminpanel:signup' %}" style="display:block; text-align:center; border:1.5px solid #e2e8f0; border-radius:8px; padding:11px; font-size:13px; font-weight:600; color:#172337; text-decoration:none; transition:all .15s;" onmouseover="this.style.borderColor='#2874f0';this.style.color='#2874f0';this.style.background='#f0f5ff';" onmouseout="this.style.borderColor='#e2e8f0';this.style.color='#172337';this.style.background='';">
            <i class="fas fa-user-plus me-2"></i>Create Admin Account
        </a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
