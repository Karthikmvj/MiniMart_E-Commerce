<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MiniMart Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --mini-navy: #172337;
            --mini-blue: #2874f0;
            --mini-orange: #ff9f00;
            --mini-bg: #f3f6fb;
            --mini-border: #dbe3ef;
        }
        body {
            background: var(--mini-navy);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            max-width: 400px;
            width: 100%;
            padding: 28px;
        }
        .minimart-logo {
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            text-decoration: none;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .minimart-logo:hover {
            transform: scale(1.1) rotate(-3deg);
        }
        .btn-primary {
            background: var(--mini-blue);
            border-color: var(--mini-blue);
            font-size: 14px;
            font-weight: 700;
            padding: 10px;
        }
        .btn-primary:hover {
            background: #1b62db;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="minimart-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" style="vertical-align: middle;">
                <defs>
                    <linearGradient id="miniMartGradAdminReset" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#FF5E3A" />
                        <stop offset="100%" stop-color="#FFB800" />
                    </linearGradient>
                </defs>
                <rect x="8" y="8" width="84" height="84" rx="22" fill="url(#miniMartGradAdminReset)" />
                <path d="M 26 70 L 26 30 L 50 54 L 74 30 L 74 70" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
        <h3 class="fw-bold mb-1" style="font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.5px;">Mini<span style="background: linear-gradient(135deg, #FF5E3A, #FBBF24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">Mart</span></h3>
        <p class="text-muted text-uppercase fw-semibold small mb-4">Set Admin Password</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if 'error' in message.tags %}danger{% else %}success{% endif %} alert-dismissible fade show text-start" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="text-start">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_password" class="form-label fw-bold small text-muted">NEW PASSWORD</label>
                <input type="password" name="password" class="form-control" id="id_password" placeholder="Enter new password" required>
            </div>
            <div class="mb-4">
                <label for="id_confirm_password" class="form-label fw-bold small text-muted">CONFIRM NEW PASSWORD</label>
                <input type="password" name="confirm_password" class="form-control" id="id_confirm_password" placeholder="Confirm new password" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Reset Password</button>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
