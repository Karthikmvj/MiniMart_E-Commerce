{% extends 'adminpanel/base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header bg-white pt-3 pb-2">
        <h4 class="mb-0">{{ title }}</h4>
    </div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-4">
                <button type="submit" class="btn btn-success"><i class="bi bi-check2"></i> Save Category</button>
                <a href="{% url 'adminpanel:category_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
