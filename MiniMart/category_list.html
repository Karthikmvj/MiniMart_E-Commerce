{% extends 'adminpanel/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Categories</h2>
    <a href="{% url 'adminpanel:category_create' %}" class="btn btn-primary shadow-sm"><i class="bi bi-plus-lg"></i> Add Category</a>
</div>
<div class="card shadow-sm border-0">
    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Slug</th>
                    <th class="text-end">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for category in categories %}
                <tr>
                    <td>{{ category.id }}</td>
                    <td>{{ category.category_name }}</td>
                    <td class="text-muted">{{ category.slug }}</td>
                    <td class="text-end">
                        <a href="{% url 'adminpanel:category_update' category.id %}" class="btn btn-sm btn-outline-warning">Edit</a>
                        <a href="{% url 'adminpanel:category_delete' category.id %}" class="btn btn-sm btn-outline-danger">Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="text-center py-4 text-muted">No categories found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
