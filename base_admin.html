<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; height: 100vh; overflow: hidden; }
        .sidebar { min-width: 250px; background-color: #343a40; color: white; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover { background-color: #495057; color: white; }
        .main-content { flex-grow: 1; padding: 20px; overflow-y: auto; background-color: #f8f9fa; }
    </style>
</head>
<body>

    <!-- Sidebar Layout -->
    <div class="sidebar">
        <h4 class="text-center mb-4">MiniMart Admin</h4>
        <a href="{% url 'adminpanel:dashboard' %}">Dashboard</a>
        <a href="{% url 'adminpanel:product_list' %}">Products</a>
        <a href="{% url 'adminpanel:category_list' %}">Categories</a>
        <a href="{% url 'adminpanel:order_list' %}">Orders</a>
        <a href="{% url 'adminpanel:user_list' %}">Users</a>
        <a href="{% url 'adminpanel:sales_report' %}">Sales Report</a>
        <a href="{% url 'logout' %}" class="mt-5 text-danger">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
